name: Deploy to Apify Actor

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - name: Push actor
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: npx -y apify-cli@latest push caring_dizi/gimmie-dat-shyt --force
